
version: "3.9"

services:
  db:
    image: mysql:8.4-oracle
    container_name: db
    environment:
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      database-network:
        ipv4_address: 10.30.0.10
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} --password=$(cat /run/secrets/db_password) --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  api:
    build: ./backend
    container_name: api
    env_file: ./.env
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      frontend-network:
      backend-network:
      database-network:
        ipv4_address: 10.30.0.20
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    restart: unless-stopped

  web:
    build: ./frontend
    container_name: web
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    networks:
      frontend-network:
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    restart: unless-stopped

networks:
  frontend-network:
    name: frontend-network
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
          gateway: 10.10.0.1
  backend-network:
    name: backend-network
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.20.0.0/24
          gateway: 10.20.0.1
  database-network:
    name: database-network
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.30.0.0/24
          gateway: 10.30.0.1

volumes:
  db_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
